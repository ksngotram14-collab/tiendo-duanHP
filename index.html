<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiến Độ Dự Án — HP CONS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg:#F0F4F8; --card:#ffffff; --border:#E2E8F0; --border2:#CBD5E1;
    --txt:#1E293B; --txt2:#64748B; --txt3:#94A3B8;
    --accent:#185FA5; --accent-lt:#EBF4FF; --accent-dk:#0C447C;
    --success:#16A34A; --success-lt:#DCFCE7;
    --warn:#B45309; --warn-lt:#FEF3C7; --warn-bd:#FDE68A;
    --danger:#DC2626; --danger-lt:#FEE2E2; --danger-bd:#FECACA;
    --done:#64748B; --done-lt:#F1F5F9;
    --radius:8px; --radius-lg:12px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);font-family:var(--font);min-height:100vh;color:var(--txt)}
  input,select,textarea{font-family:var(--font);font-size:13px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);width:100%;color:var(--txt);background:var(--card)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(24,95,165,.12)}
  textarea{resize:vertical}
  input[type=range]{padding:0;border:none;box-shadow:none;accent-color:var(--accent)}

  /* GATE */
  #gate{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:2rem 1rem;transition:opacity .28s ease}
  #app{display:none;opacity:0;transition:opacity .35s ease;padding:1rem;max-width:1140px;margin:0 auto}
  .pw-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem 2rem;width:100%;max-width:370px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.07)}
  .pw-logo{display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem}
  .pw-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:11px;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:.02em;transition:background .18s}
  .pw-btn:hover{background:var(--accent-dk)}
  .pw-err{display:none;font-size:12px;color:var(--danger);background:var(--danger-lt);border:1px solid var(--danger-bd);border-radius:var(--radius);padding:8px 10px;margin-bottom:10px;text-align:left}

  /* HEADER */
  .hd{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.85rem 1.25rem;margin-bottom:.85rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .hd-logo{display:flex;align-items:center;gap:10px}
  .hd-meta{display:flex;flex-direction:column;gap:2px}
  .hd-eyebrow{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--txt3);text-transform:uppercase}
  .hd-title{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .hd-actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

  /* METRIC CARDS */
  .mets{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:.85rem}
  .met{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.15rem}
  .met-label{font-size:11.5px;color:var(--txt2);margin-bottom:6px;font-weight:500}
  .met-val{font-size:24px;font-weight:700;line-height:1}
  .met-sub{font-size:11px;color:var(--txt3);margin-top:4px}

  /* TABS */
  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:0;gap:0;overflow-x:auto;background:var(--card);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:0 .5rem;border:1px solid var(--border);border-bottom:none}
  .tab{background:none;border:none;border-bottom:2.5px solid transparent;padding:10px 15px;cursor:pointer;font-size:13px;color:var(--txt2);display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:color .15s;font-family:var(--font)}
  .tab:hover{color:var(--txt)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .tab-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg);padding:1.15rem;margin-bottom:.85rem}

  /* TABLE */
  .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th{text-align:left;padding:8px 10px;font-weight:600;font-size:11.5px;color:var(--txt2);border-bottom:1px solid var(--border);background:#F8FAFC;white-space:nowrap}
  .tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tr:hover td{background:#F8FAFC}

  /* BADGE */
  .badge{display:inline-block;padding:3px 9px;border-radius:10px;font-size:11.5px;font-weight:600;white-space:nowrap}
  .b-track{background:var(--success-lt);color:var(--success)}
  .b-risk{background:var(--warn-lt);color:var(--warn)}
  .b-delay{background:var(--danger-lt);color:var(--danger)}
  .b-done{background:var(--done-lt);color:var(--done)}
  .b-wait{background:var(--accent-lt);color:var(--accent)}

  /* FORM */
  .fg{margin-bottom:12px}
  .fl{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--txt2)}
  .fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .pb{background:var(--border);border-radius:4px;height:6px;margin-top:4px}
  .pf{height:6px;border-radius:4px}

  /* CARD */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:.85rem}

  /* BUTTONS */
  .btn{border-radius:var(--radius);cursor:pointer;font-size:13px;padding:7px 14px;display:inline-flex;align-items:center;gap:5px;font-family:var(--font);font-weight:500;transition:background .15s,border-color .15s}
  .btn-p{background:var(--accent);color:#fff;border:none}.btn-p:hover{background:var(--accent-dk)}
  .btn-s{background:none;border:1px solid var(--border2);color:var(--txt)}.btn-s:hover{background:var(--bg)}
  .btn-d{background:none;border:1px solid var(--danger-bd);color:var(--danger);font-size:12px;padding:5px 10px;font-family:var(--font);cursor:pointer;border-radius:var(--radius);display:inline-flex;align-items:center;gap:4px;transition:background .15s}.btn-d:hover{background:var(--danger-lt)}
  .btn-e{background:none;border:1px solid var(--border);color:var(--txt2);font-size:12px;padding:5px 9px;font-family:var(--font);cursor:pointer;border-radius:var(--radius)}.btn-e:hover{background:var(--bg)}
  .btn-logout{background:none;border:1px solid var(--danger-bd);color:var(--danger);border-radius:var(--radius);padding:7px 12px;cursor:pointer;font-size:13px;font-family:var(--font);display:inline-flex;align-items:center;gap:4px}.btn-logout:hover{background:var(--danger-lt)}

  .sh{font-size:13px;font-weight:600;color:var(--txt);margin:0 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .cb-row{display:flex;flex-wrap:wrap;gap:6px}
  .cb-item{display:flex;align-items:center;gap:4px;font-size:12.5px;padding:5px 9px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;color:var(--txt);transition:all .15s}
  .cb-item:has(input:checked){border-color:var(--accent);background:var(--accent-lt);color:var(--accent)}
  .cb-item input{width:auto;margin:0}

  /* DELAY LOG */
  .dl-wrap{border:1.5px solid var(--accent);border-radius:var(--radius);padding:1rem;margin-top:8px;background:var(--accent-lt)}
  .dl-wrap input,.dl-wrap select,.dl-wrap textarea{background:var(--card)!important}
  .btn-add-dl{background:var(--accent);color:#fff;border:none;font-weight:600;padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-family:var(--font);display:flex;align-items:center;gap:5px;width:100%;justify-content:center}.btn-add-dl:hover{background:var(--accent-dk)}
  .late-box{border:1.5px solid var(--warn-bd);border-radius:var(--radius);padding:1rem;background:var(--warn-lt)}
  .late-box textarea{background:var(--card)!important}

  /* GANTT */
  .gt-row{display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:38px}
  .gt-lbl{width:185px;flex-shrink:0;font-size:12px;padding:3px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gt-tl{flex:1;position:relative;height:38px;overflow:hidden}
  .gt-bar{position:absolute;height:20px;top:9px;border-radius:3px;padding:0 6px;font-size:11px;color:#fff;font-weight:500;overflow:hidden;white-space:nowrap;min-width:3px;display:flex;align-items:center}
  .gt-tdl{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);z-index:2}
  .vp-btn{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:5px 12px;cursor:pointer;font-size:12.5px;color:var(--txt2);font-family:var(--font)}.vp-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* KPI */
  .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem}
  .kpi-score{font-size:28px;font-weight:800;line-height:1}
  .score-hi{color:var(--success)}.score-md{color:var(--warn)}.score-lo{color:var(--danger)}
  .slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .stag{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-size:12.5px;color:var(--txt)}
  .hi{font-size:16px;font-weight:600;border:none;background:transparent;color:var(--txt);padding:0;outline:none;border-bottom:1.5px solid transparent;font-family:var(--font)}.hi:focus{border-bottom-color:var(--accent)}
  details>summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:5px}
  details>summary::-webkit-details-marker{display:none}

  /* TOAST */
  #toast-ct{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .toast{background:var(--txt);color:#fff;border-radius:var(--radius);padding:10px 16px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;min-width:200px;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:tIn .22s ease;pointer-events:auto}
  .toast-ok{background:#15803D}.toast-err{background:var(--danger)}.toast-warn{background:var(--warn)}
  @keyframes tIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .toast-out{animation:tOut .22s ease forwards}
  @keyframes tOut{to{opacity:0;transform:translateY(8px)}}

  /* MODAL */
  #modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:8888;align-items:center;justify-content:center;padding:1rem}
  #modal-bg.show{display:flex}
  .modal{background:var(--card);border-radius:var(--radius-lg);padding:1.75rem;max-width:400px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.18)}
  .modal-title{font-size:15px;font-weight:700;margin-bottom:8px}
  .modal-body{font-size:13.5px;color:var(--txt2);margin-bottom:1.5rem;line-height:1.6}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end}

  @media(max-width:700px){
    .fr{grid-template-columns:1fr}.fr3{grid-template-columns:1fr 1fr}
    #app{padding:.6rem}.mets{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>

<div id="toast-ct"></div>
<div id="modal-bg">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-s" id="modal-cancel">Huỷ</button>
      <button class="btn btn-d" id="modal-ok"></button>
    </div>
  </div>
</div>

   DATE UTILS
   ============================================================ */
function pd(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function fd(d){if(!d)return'—';return d.toLocaleDateString('vi-VN')}
function ad(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function dd(a,b){return Math.round((b-a)/86400000)}
function aend(p){const s=pd(p.start);if(!s)return null;return ad(s,p.days+p.dl.reduce((a,d)=>a+d.n,0)-1)}

/* ============================================================
   STATUS LOGIC
   ============================================================ */
function stat(p){
  if(p.ae){return pd(p.ae)<=aend(p)?'done':'done-late'}
  const e=aend(p);if(!e)return'wait';
  const dl=dd(TODAY,e);return dl<0?'delayed':dl<=3?'risk':'track';
}
function sbadge(p){
  const s=stat(p),m={'done':['b-done','Hoàn thành'],'done-late':['b-delay','HT Trễ'],'delayed':['b-delay','Trễ hạn'],'risk':['b-risk','Sắp hạn'],'track':['b-track','Đúng tiến độ'],'wait':['b-wait','Chờ bắt đầu']};
  const[c,l]=m[s]||['b-wait','—'];return`<span class="badge ${c}">${l}</span>`;
}
function pbar(v){
  const c=v>=80?'var(--success)':v>=50?'var(--warn)':'var(--danger)';
  return`<div style="font-size:11.5px;color:var(--txt2);font-weight:600">${v}%</div><div class="pb"><div class="pf" style="width:${v}%;background:${c}"></div></div>`;
}
function autoDp(p){
  const s=pd(p.start);if(!s)return p.dp;
  const el=Math.max(0,dd(s,TODAY));
  const tot=p.days+p.dl.reduce((a,d)=>a+d.n,0);
  return Math.min(100,Math.max(0,Math.round(el/tot*100)));
}

/* ============================================================
   TOAST & MODAL
   ============================================================ */
function toast(msg,type='ok'){
  const ct=document.getElementById('toast-ct');
  const el=document.createElement('div');
  el.className='toast toast-'+type;
  const ico={'ok':'ti-circle-check','err':'ti-alert-circle','warn':'ti-alert-triangle'}[type]||'ti-info-circle';
  el.innerHTML=`<i class="ti ${ico}"></i>${msg}`;
  ct.appendChild(el);
  setTimeout(()=>{el.classList.add('toast-out');setTimeout(()=>el.remove(),250)},2600);
}
let _modalCb=null;
function showConfirm(title,body,label,cb){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-ok').innerHTML=`<i class="ti ti-trash"></i> ${label}`;
  _modalCb=cb;
  document.getElementById('modal-bg').classList.add('show');
}

document.getElementById('modal-ok').onclick=()=>{document.getElementById('modal-bg').classList.remove('show');if(_modalCb)_modalCb()};

function saveP(){
  const ma=(document.getElementById('fma')?.value||'').trim();
  const name=(document.getElementById('fn')?.value||'').trim();
  const type=document.getElementById('ft')?.value;
  const start=document.getElementById('fs')?.value;
  const days=parseInt(document.getElementById('fdy')?.value);
  if(!ma||!name||!type||!start||!days){toast('Vui lòng điền đầy đủ các trường bắt buộc (*)','err');return}
  const mgr=document.querySelector('input[name="mgr"]:checked')?.value||'';
  const exec=[...document.querySelectorAll('input[name="ex"]:checked')].map(e=>e.value);
  const desc=document.getElementById('fd')?.value||'';
  const dp=parseInt(document.getElementById('fdp')?.value)||0;
  const ae=document.getElementById('fa')?.value||null;
  const dr=(document.getElementById('fdr')?.value||'').trim();
  if(ae&&eid){const p=P.find(x=>x.id===eid);if(p&&pd(ae)>aend(p)&&!dr){toast('Bắt buộc nhập lý do trễ hạn để thẩm định KPI nội bộ','err');return}}
  if(eid){
    const p=P.find(x=>x.id===eid);
    if(p)Object.assign(p,{ma,name,mgr,type,start,days,desc,exec,dp,ae:ae||null,dr});
    toast('Đã lưu thay đổi','ok');
  }else{
    P.push({id:nid++,ma,name,mgr,type,start,days,desc,exec,dp,dl:[],ae:null,dr:''});
    toast('Đã tạo dự án mới','ok');
  }
  saveToLS();renderM();go('list');
}
function delP(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  showConfirm('Xoá dự án',`Xoá dự án <strong>${p.name}</strong>?<br>Không thể hoàn tác.`,'Xoá dự án',()=>{
    P=P.filter(p=>p.id!==id);eid=null;saveToLS();toast('Đã xoá dự án','warn');renderM();go('list');
  });
}

/* ============================================================
   RENDER GANTT
   ============================================================ */
function renderGantt(){
  if(!P.length){document.getElementById('p-gantt').innerHTML='<div style="text-align:center;padding:3rem;color:var(--txt2)">Chưa có dự án.</div>';return}
  let minD,maxD;
  if(gv==='1m'){minD=ad(TODAY,-3);maxD=ad(TODAY,27)}
  else if(gv==='2m'){minD=ad(TODAY,-5);maxD=ad(TODAY,55)}
  else{minD=new Date(2099,0,1);maxD=new Date(2000,0,1);P.forEach(p=>{const s=pd(p.start),e=aend(p);if(s&&s<minD)minD=s;if(e&&e>maxD)maxD=e});minD=ad(minD,-5);maxD=ad(maxD,7)}
  const tot=Math.max(1,dd(minD,maxD));
  function pc(d){return Math.max(0,Math.min(100,dd(minD,d)/tot*100)).toFixed(1)}
  const todP=parseFloat(pc(TODAY));
  const SC={'track':'#16A34A','risk':'#B45309','delayed':'#DC2626','done':'#64748B','done-late':'#D85A30','wait':'#185FA5'};
  let wh='';let c=new Date(minD);
  while(c<=maxD){const l=pc(c);wh+=`<div style="position:absolute;left:${l}%;top:0;bottom:0;border-left:1px solid var(--border);padding:0 3px;font-size:10px;color:var(--txt3);line-height:28px;white-space:nowrap">${c.getDate()}/${c.getMonth()+1}</div>`;c=ad(c,7)}
  const rows=P.map(p=>{const s=pd(p.start),e=aend(p);if(!s||!e)return'';
    const L=parseFloat(pc(s)),R=parseFloat(pc(e)),W=Math.max(R-L,0.4),col=SC[stat(p)]||'#64748B';
    const nm=p.name.length>22?p.name.substring(0,22)+'…':p.name;
    return`<div class="gt-row"><div class="gt-lbl"><div style="font-weight:600;color:var(--txt)">${nm}</div><div style="font-size:11px;color:var(--txt2)">${p.ma}</div></div>
      <div class="gt-tl"><div class="gt-tdl" style="left:${todP}%"></div><div class="gt-bar" style="left:${L}%;width:${W}%;background:${col}" title="${p.name}: ${fd(s)} → ${fd(e)}">${W>14?nm:''}</div></div></div>`;}).join('');
  const leg=Object.entries({'track':'Đúng tiến độ','risk':'Sắp hạn','delayed':'Trễ hạn','done':'Hoàn thành','done-late':'Hoàn thành Trễ','wait':'Chờ bắt đầu'}).map(([k,v])=>`<span style="display:flex;align-items:center;gap:4px;font-size:12px"><span style="width:12px;height:6px;border-radius:2px;background:${SC[k]};display:inline-block"></span>${v}</span>`).join('')+`<span style="display:flex;align-items:center;gap:4px;font-size:12px"><span style="width:2px;height:13px;background:var(--danger);display:inline-block"></span>Hôm nay</span>`;
  const vpB=['all','1m','2m'].map((v,i)=>`<button class="vp-btn ${gv===v?'active':''}" onclick="gv='${v}';renderGantt()">${['Toàn bộ','1 tháng','2 tháng'][i]}</button>`).join('');
  document.getElementById('p-gantt').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px">
      <div style="display:flex;flex-wrap:wrap;gap:12px">${leg}</div>
      <div style="display:flex;gap:6px;align-items:center"><span style="font-size:12px;color:var(--txt2)">Hiển thị:</span>${vpB}</div>
    </div>
    <div style="overflow-x:auto"><div style="min-width:520px">
      <div class="gt-row"><div class="gt-lbl" style="font-size:11px;font-weight:600;color:var(--txt2)">Dự án / Mã DA</div><div class="gt-tl" style="height:28px"><div class="gt-tdl" style="left:${todP}%"></div>${wh}</div></div>${rows}
    </div></div>
    <div style="margin-top:10px;font-size:12px;color:var(--txt3)"><i class="ti ti-info-circle"></i> Ngày kế hoạch đã tích lũy tổng ngày delay offset.</div>`;
}

/* ============================================================
   RENDER KPI
   ============================================================ */
function renderKPI(){
  const allM=[...new Set(P.filter(p=>p.mgr).map(p=>p.mgr))];
  const allS=[...new Set(P.flatMap(p=>p.exec))];

  function scoreClass(s){return s>=85?'score-hi':s>=65?'score-md':'score-lo'}
  function calcScore(name){
    const all=[...new Set([...P.filter(p=>p.mgr===name),...P.filter(p=>p.exec.includes(name))])];
    const dn=all.filter(p=>p.ae);
    const onT=dn.filter(p=>pd(p.ae)<=aend(p)).length;
    const late=dn.filter(p=>pd(p.ae)>aend(p));
    const totDelDays=late.reduce((a,p)=>a+Math.max(0,dd(aend(p),pd(p.ae))),0);
    const score=Math.max(0,Math.min(100,Math.round(100-late.length*12-totDelDays*1.5)));
    return{score,onT,late:late.length,total:all.length,done:dn.length,act:all.filter(p=>!p.ae).length,totDelDays};
  }

  function prow(name,role){
    const mgd=P.filter(p=>p.mgr===name),exc=P.filter(p=>p.exec.includes(name)&&p.mgr!==name);
    if(!mgd.length&&!exc.length)return'';
    const sc=calcScore(name);
    const ini=name.split(' ').slice(-1)[0][0]||'?';
    const totDlAll=[...new Set([...mgd,...exc])].reduce((a,p)=>a+p.dl.reduce((b,d)=>b+d.n,0),0);
    return`<tr>
      <td><div style="display:flex;align-items:center;gap:8px">
        <div style="width:32px;height:32px;border-radius:50%;background:var(--accent-lt);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0">${ini}</div>
        <div><div style="font-size:13px;font-weight:600">${name}</div><div style="font-size:11px;color:var(--txt2)">${role}</div></div>
      </div></td>
      <td style="text-align:center">${mgd.length||'—'}</td>
      <td style="text-align:center">${exc.length||'—'}</td>
      <td style="text-align:center">${sc.act}</td>
      <td style="text-align:center">${sc.done}</td>
      <td style="text-align:center;color:var(--success);font-weight:700">${sc.onT||'—'}</td>
      <td style="text-align:center;color:${sc.late?'var(--danger)':'var(--txt2)'};font-weight:${sc.late?'700':'400'}">${sc.late||'—'}</td>
      <td style="text-align:center">${totDlAll>0?`<span style="color:var(--danger);font-weight:600">+${totDlAll}</span>`:'0'}</td>
      <td style="text-align:center"><span class="kpi-score ${scoreClass(sc.score)}" style="font-size:16px">${sc.done?sc.score+'':'N/A'}</span></td>
    </tr>`;
  }

  const rows=[...allM.map(n=>prow(n,'Quản lý')),...allS.filter(n=>!allM.includes(n)).map(n=>prow(n,'Thực hiện'))].filter(Boolean).join('');
  document.getElementById('p-kpi').innerHTML=`
    <div style="margin-bottom:14px">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">Bảng KPI Nhân sự — Phòng Đấu thầu</div>
      <div style="font-size:12px;color:var(--txt2)">Công thức điểm KPI: 100 − (Trễ × 12) − (Tổng ngày trễ × 1.5) | Clamp [0, 100]</div>
    </div>
    <div style="overflow-x:auto"><table class="tbl" style="min-width:620px"><thead><tr>
      <th style="width:170px">Nhân sự</th>
      <th style="width:65px;text-align:center">Quản lý</th>
      <th style="width:70px;text-align:center">Thực hiện</th>
      <th style="width:70px;text-align:center">Đang thực hiện</th>
      <th style="width:65px;text-align:center">Đã hoàn thành</th>
      <th style="width:75px;text-align:center">Đúng hạn</th>
      <th style="width:55px;text-align:center">Trễ</th>
      <th style="width:95px;text-align:center">Tổng ngày dời</th>
      <th style="width:75px;text-align:center">Điểm KPI</th>
    </tr></thead><tbody>${rows||'<tr><td colspan="9" style="text-align:center;color:var(--txt2);padding:3rem">Chưa có dữ liệu</td></tr>'}</tbody></table></div>
    <div style="margin-top:10px;font-size:12px;color:var(--txt3)"><i class="ti ti-info-circle"></i> KPI được thẩm định nội bộ cuối kỳ. Trễ có kèm lý do giải trình được xét duyệt riêng.</div>`;
}

/* ============================================================
   RENDER CFG
   ============================================================ */
function renderCFG(){
  const slots=Array.from({length:10},(_,i)=>`<div class="fg" style="margin-bottom:8px"><label class="fl">Quản lý ${i+1}</label><input type="text" id="ms${i}" value="${CFG.managers[i]||''}" placeholder="Nhập tên quản lý..."></div>`).join('');
  const stags=CFG.staff.map((s,i)=>`<div class="stag">${s}<button onclick="rmSt(${i})" style="background:none;border:none;color:var(--danger);cursor:pointer;padding:0;margin-left:6px;font-size:15px;line-height:1"><i class="ti ti-x"></i></button></div>`).join('');
  document.getElementById('p-cfg').innerHTML=`
    <p class="sh">Phòng ban & Năm báo cáo</p>
    <div class="fr fg">
      <div class="fg"><label class="fl">Tên phòng ban</label><input id="cd" type="text" value="${CFG.deptName}"></div>
      <div class="fg"><label class="fl">Năm báo cáo</label><input id="cy" type="text" value="${CFG.deptYear}"></div>
    </div>
    <p class="sh">Danh sách Quản lý <span style="font-size:12px;font-weight:400;color:var(--txt2)">(10 vị trí — hiển thị dạng radio trong form)</span></p>
    <div class="slot-grid" style="margin-bottom:1.1rem">${slots}</div>
    <p class="sh">Danh sách Nhân sự thực hiện <span style="font-size:12px;font-weight:400;color:var(--txt2)">(source checkbox tích chọn)</span></p>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${stags||'<span style="font-size:13px;color:var(--txt2)">Chưa có nhân sự nào</span>'}</div>
    <div style="display:flex;gap:8px;margin-bottom:1.25rem"><input id="nst" type="text" placeholder="Tên nhân sự mới..." style="flex:1"><button class="btn btn-p" onclick="addSt()"><i class="ti ti-plus"></i> Thêm</button></div>
    <div style="display:flex;justify-content:flex-end"><button class="btn btn-p" onclick="saveCFG()"><i class="ti ti-device-floppy"></i> Lưu cấu hình & áp dụng</button></div>`;
}

function addSt(){
  const inp=document.getElementById('nst'),name=(inp?.value||'').trim();
  if(!name)return;
  if(CFG.staff.includes(name)){toast('Nhân sự đã tồn tại','warn');return}
  CFG.staff.push(name);if(inp)inp.value='';saveToLS();renderCFG();
}
function rmSt(i){CFG.staff.splice(i,1);saveToLS();renderCFG()}
function saveCFG(){
  const dept=(document.getElementById('cd')?.value||'').trim();
  const year=(document.getElementById('cy')?.value||'').trim();
  if(dept){CFG.deptName=dept;const h=document.getElementById('h-dept');if(h)h.value=dept}
  if(year){CFG.deptYear=year;const h=document.getElementById('h-year');if(h)h.value=year}
  for(let i=0;i<10;i++){const el=document.getElementById('ms'+i);if(el)CFG.managers[i]=el.value.trim()}
  saveToLS();renderM();toast('Đã lưu cấu hình. Danh sách quản lý & nhân sự đã cập nhật.','ok');
}

/* ============================================================
   EXPORT EXCEL
   ============================================================ */
function expXL(){
  function doExp(){
    const WB=XLSX.utils.book_new();
    let mn=new Date(2099,0,1),mx=new Date(2000,0,1);
    P.forEach(p=>{const s=pd(p.start),e=aend(p);if(s&&s<mn)mn=s;if(e&&e>mx)mx=e});
    if(!P.length){mn=TODAY;mx=ad(TODAY,30)}
    const wks=[];let wc=new Date(mn);while(wc<=mx){wks.push(new Date(wc));wc=ad(wc,7)}
    const whdr=wks.map((w,i)=>`T${i+1}\n${w.getDate()}/${w.getMonth()+1}`);
    const now=new Date();
    const aoa=[
      ['HP CONS','','','BẢNG THEO DÕI TIẾN ĐỘ DỰ ÁN — PHÒNG ĐẤU THẦU','','','','','',''].concat(Array(whdr.length).fill('')),
      ['','','',CFG.deptName+' — Năm '+CFG.deptYear],
      ['Ngày lập:',now.toLocaleDateString('vi-VN'),'','Người lập:','','Người kiểm duyệt:',''],
      [],
      ['STT','Mã dự án','Tên dự án','Phân loại','Quản lý phụ trách','Nhân sự thực hiện','Tiến độ cập nhật','Biện pháp kiểm soát','Phản hồi','% Hoàn thành'].concat(whdr)
    ];
    P.forEach((p,i)=>{
      const s=pd(p.start),e=aend(p);
      const td=p.dl.length?`Dời ${p.dl.length} lần (+${p.dl.reduce((a,d)=>a+d.n,0)}n)`:'Đúng kế hoạch';
      const wcs=wks.map(w=>{if(!s||!e)return'';return(w<=e&&ad(w,6)>=s)?'▓':''});
      aoa.push([i+1,p.ma,p.name,p.type,p.mgr,p.exec.join(', '),td,'','',p.dp+'%'].concat(wcs));
    });
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[{wch:5},{wch:13},{wch:28},{wch:22},{wch:20},{wch:22},{wch:18},{wch:18},{wch:12},{wch:10}].concat(wks.map(()=>({wch:5})));
    ws['!merges']=[{s:{r:0,c:3},e:{r:0,c:9}}];
    XLSX.utils.book_append_sheet(WB,ws,'Tiến Độ');
    XLSX.writeFile(WB,`TienDo_${CFG.deptName.replace(/\s/g,'_')}_${CFG.deptYear}.xlsx`);
    toast('Đã xuất file Excel thành công','ok');
  }
  if(window.XLSX){doExp();return}
  const sc=document.createElement('script');
  sc.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  sc.onload=doExp;sc.onerror=()=>toast('Không tải được thư viện xlsx','err');
  document.head.appendChild(sc);
}

  const hadData=loadFromLS();
  if(!hadData){loadDemo();}
})();
